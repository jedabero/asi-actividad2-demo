services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672" # UI: http://localhost:15672 (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "rabbitmq-diagnostics -q check_running && rabbitmq-diagnostics -q listeners | grep -q 'port: 5672'",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  # Sensor: publica lecturas cada 1s (temp + humidity)
  sensor:
    build: ./services/sensor
    restart: unless-stopped
    environment:
      RABBIT_URL: amqp://guest:guest@rabbitmq:5672
      SENSOR_ID: sensor-1
      INTERVAL_MS: "1000"
    depends_on:
      rabbitmq:
        condition: service_healthy

  # Worker de persistencia: consume y guarda lecturas
  ingestor:
    build: ./services/data-ingestor
    restart: unless-stopped
    environment:
      RABBIT_URL: amqp://guest:guest@rabbitmq:5672
      TELEMETRY_DB_PATH: /data/telemetry.db
    volumes:
      - telemetry_data:/data
    depends_on:
      rabbitmq:
        condition: service_healthy

  # Worker de reportes: consume jobs, ejecuta SQL agregado, llena jobs/job_attempts/job_results
  report-worker:
    build: ./services/report-worker
    restart: unless-stopped
    environment:
      RABBIT_URL: amqp://guest:guest@rabbitmq:5672
      TELEMETRY_DB_PATH: /data/telemetry.db
      MAX_ATTEMPTS: "3"
    volumes:
      - telemetry_data:/data
    depends_on:
      rabbitmq:
        condition: service_healthy
      ingestor:
        condition: service_started

  # Next.js: crear jobs y consulta resultados (vía broker/eventos)
  report-web:
    build: ./services/report-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      RABBIT_URL: amqp://guest:guest@rabbitmq:5672
      WEB_DB_PATH: /data/web.db
      PORT: "3000"
      NODE_ENV: production
    volumes:
      - web_data:/data
    depends_on:
      rabbitmq:
        condition: service_healthy
      report-web-worker:
        condition: service_started

  # Worker helper de report-web
  report-web-worker:
    build: ./services/report-web-worker
    restart: unless-stopped
    environment:
      RABBIT_URL: amqp://guest:guest@rabbitmq:5672
      WEB_DB_PATH: /data/web.db
    volumes:
      - web_data:/data
    depends_on:
      rabbitmq:
        condition: service_healthy

  # Observabilidad: consume events.audit
  auditor:
    build: ./services/auditor
    restart: unless-stopped
    environment:
      RABBIT_URL: amqp://guest:guest@rabbitmq:5672
      AUDIT_DB_PATH: /data/audit.db
    volumes:
      - audit_data:/data
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  telemetry_data:
  web_data:
  audit_data:
